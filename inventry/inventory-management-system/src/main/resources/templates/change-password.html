<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Change Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
    <script th:src="@{/js/theme-toggle.js}" defer></script>
</head>
<body>
<div class="d-flex layout">
    <aside class="sidebar d-flex flex-column">
        <a class="brand" sec:authorize="hasRole('ADMIN')" th:href="@{/admin/dashboard}">Inventory IMS</a>
        <a class="brand" sec:authorize="hasRole('USER')" th:href="@{/user/dashboard}">Inventory IMS</a>
        <nav class="nav flex-column p-2 gap-1" sec:authorize="hasRole('USER')">
            <a class="nav-link" th:href="@{/user/dashboard}">Dashboard</a>
            <a class="nav-link" th:href="@{/inventory}">Inventory</a>
            <a class="nav-link" th:href="@{/low-stock}">Update Stock</a>
            <a class="nav-link" th:href="@{/requests}">Requests</a>
            <a class="nav-link active" th:href="@{/change-password}">Change Password</a>
            <form th:action="@{/logout}" method="post" class="mt-2">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-warning w-100" type="submit">Logout</button>
            </form>
        </nav>
    </aside>

    <main class="main-content">
        <h3 class="mb-3">Change Password</h3>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <div class="card shadow-sm" style="max-width: 520px;">
            <div class="card-body">
                <form th:action="@{/change-password}" method="post" class="row g-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="col-12">
                        <label class="form-label">Current Password</label>
                        <input type="password" class="form-control" name="currentPassword" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">New Password</label>
                        <input type="password" class="form-control" name="newPassword" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Confirm New Password</label>
                        <input type="password" class="form-control" name="confirmPassword" required>
                    </div>
                    <div class="col-12">
                        <button class="btn btn-primary" type="submit">Update Password</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
</body>
</html>
