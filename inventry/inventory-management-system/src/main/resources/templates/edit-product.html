<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
    <script th:src="@{/js/theme-toggle.js}" defer></script>
</head>
<body>
<div class="d-flex layout">
    <aside class="sidebar d-flex flex-column">
        <a class="brand" th:href="@{/dashboard}">Inventory IMS</a>
        <nav class="nav flex-column p-2 gap-1">
            <a class="nav-link" th:href="@{/dashboard}">Dashboard</a>
            <a class="nav-link active" th:href="@{/products}">Products</a>
            <a class="nav-link" th:href="@{/categories}">Categories</a>
            <a class="nav-link" th:href="@{/suppliers}">Suppliers</a>
            <a class="nav-link" th:href="@{/users}">Users</a>
            <a class="nav-link" th:href="@{/requests}">Requests</a>
            <a class="nav-link" th:href="@{/reports}">Reports</a>
            <a class="nav-link" href="/reports#login-audit-log">Login Audit</a>
            <a class="nav-link" th:href="@{/low-stock}">Low Stock</a>
            <form th:action="@{/logout}" method="post" class="mt-2">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-warning w-100" type="submit">Logout</button>
            </form>
        </nav>
    </aside>

    <main class="main-content">
        <h2>Edit Product</h2>
        <div class="card shadow-sm" style="max-width:700px;">
            <div class="card-body">
                <form th:action="@{/update-product}" method="post" class="row g-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="id" th:value="${product.id}">
                    <input type="hidden" name="image" th:value="${product.image}">

                    <div class="col-md-6">
                        <label class="form-label">Name</label>
                        <input type="text" name="name" th:value="${product.name}" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Category</label>
                        <input type="text" name="category" th:value="${product.category}" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Price</label>
                        <input type="number" step="0.01" min="0" name="price" th:value="${product.price}" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Quantity</label>
                        <input type="number" min="0" name="quantity" th:value="${product.quantity}" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Minimum Stock</label>
                        <input type="number" min="0" name="minimumStock" th:value="${product.minimumStock}" class="form-control" required>
                    </div>

                    <div class="col-12 d-flex gap-2">
                        <button class="btn btn-success">Update</button>
                        <a th:href="@{/products}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
</body>
</html>
