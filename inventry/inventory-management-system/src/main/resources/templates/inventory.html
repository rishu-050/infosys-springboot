<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link th:href="@{/css/app.css}" rel="stylesheet">
    <script th:src="@{/js/theme-toggle.js}" defer></script>
</head>
<body>
<div class="d-flex layout">
    <aside class="sidebar d-flex flex-column">
        <a class="brand" sec:authorize="hasRole('ADMIN')" th:href="@{/admin/dashboard}">Inventory IMS</a>
        <a class="brand" sec:authorize="hasRole('USER')" th:href="@{/user/dashboard}">Inventory IMS</a>
        <nav class="nav flex-column p-2 gap-1" sec:authorize="hasRole('ADMIN')">
            <a class="nav-link" th:href="@{/admin/dashboard}">Dashboard</a>
            <a class="nav-link active" th:href="@{/inventory}">Inventory</a>
            <a class="nav-link" th:href="@{/requests}">Requests</a>
            <a class="nav-link" th:href="@{/low-stock}">Low Stock</a>
            <form th:action="@{/logout}" method="post" class="mt-2">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-warning w-100" type="submit">Logout</button>
            </form>
        </nav>
        <nav class="nav flex-column p-2 gap-1" sec:authorize="hasRole('USER')">
            <a class="nav-link" th:href="@{/user/dashboard}">Dashboard</a>
            <a class="nav-link active" th:href="@{/inventory}">Inventory</a>
            <a class="nav-link" th:href="@{/low-stock}">Update Stock</a>
            <a class="nav-link" th:href="@{/requests}">Requests</a>
            <a class="nav-link" th:href="@{/change-password}">Change Password</a>
            <form th:action="@{/logout}" method="post" class="mt-2">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-warning w-100" type="submit">Logout</button>
            </form>
        </nav>
    </aside>

    <main class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h3 class="mb-0">Inventory View</h3>
                <p class="text-muted mb-0">Read-only stock visibility for user accounts</p>
            </div>
            <div class="badge text-bg-light border">
                <span sec:authentication="name"></span>
                <span class="ms-1" sec:authentication="principal.authorities"></span>
            </div>
        </div>

        <div class="card shadow-sm mb-3">
            <div class="card-body">
                <form th:action="@{/inventory}" method="get" class="row g-2">
                    <div class="col-md-5">
                        <input type="text" name="name" class="form-control" placeholder="Search by product name" th:value="${name}">
                    </div>
                    <div class="col-md-5">
                        <input type="text" name="category" class="form-control" placeholder="Filter by category" th:value="${category}">
                    </div>
                    <div class="col-md-2 d-grid">
                        <button class="btn btn-primary">Apply</button>
                    </div>
                </form>
                <div class="mt-2">
                    <a class="btn btn-outline-secondary btn-sm" th:href="@{/inventory}">Reset</a>
                </div>
            </div>
        </div>

        <div class="card table-card shadow-sm">
            <div class="table-responsive">
                <table id="inventoryTable" class="table table-hover mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="p : ${products}" th:classappend="${p.quantity <= p.minimumStock} ? 'table-danger' : ''">
                        <td th:text="${p.id}"></td>
                        <td th:text="${p.name}"></td>
                        <td th:text="${p.category}"></td>
                        <td th:text="${#numbers.formatDecimal(p.price,1,2)}"></td>
                        <td th:text="${p.quantity}"></td>
                        <td>
                            <span th:if="${p.quantity > p.minimumStock}" class="badge bg-success">In Stock</span>
                            <span th:if="${p.quantity <= p.minimumStock}" class="badge bg-danger">Low Stock</span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(products)}" class="empty-state-row">
                        <td colspan="6" class="text-center py-4 text-muted">No products found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script>
    $(document).ready(function () {
        function getLengthMenu(totalRows) {
            if (totalRows <= 50) {
                return [10, 20, 50];
            }

            if (totalRows <= 200) {
                return [10, 20, 50, 100];
            }

            if (totalRows <= 500) {
                return [10, 20, 50, 100, 200];
            }

            return [10, 20, 50, 100, 200, 500];
        }

        const inventoryTable = $('#inventoryTable');
        const emptyInventoryRow = inventoryTable.find('tbody tr.empty-state-row');
        const emptyInventoryMessage = emptyInventoryRow.text().trim() || 'No products found.';

        if (emptyInventoryRow.length) {
            emptyInventoryRow.remove();
        }

        inventoryTable.DataTable({
            pageLength: 10,
            lengthMenu: getLengthMenu(inventoryTable.find('tbody tr').length),
            language: {
                emptyTable: emptyInventoryMessage
            }
        });
    });
</script>
</body>
</html>
