<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inventory Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link th:href="@{/css/app.css}" rel="stylesheet">
    <style>
        body {
            background: var(--page-bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            width: 380px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            background: var(--surface-bg);
            color: var(--text-main);
            border: 1px solid var(--surface-border);
        }

        .login-title {
            text-align: center;
            font-weight: 600;
            margin-bottom: 20px;
        }
    </style>
    <script th:src="@{/js/theme-toggle.js}" defer></script>
</head>
<body>
<div class="login-card">
    <h4 class="login-title">Inventory IMS Login</h4>

    <div th:if="${param.error}" class="alert alert-danger py-2" role="alert">
        Invalid user ID or password.
    </div>
    <div th:if="${param.logout}" class="alert alert-success py-2" role="alert">
        You have been logged out.
    </div>

    <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="mb-3">
            <label class="form-label">User ID</label>
            <input type="text" name="userId" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <button class="btn btn-primary w-100" type="submit">Login</button>
    </form>
    <p class="text-muted small mt-3 mb-0 text-center">Demo accounts: admin / admin123, USER001 / user123</p>
</div>
</body>
</html>
