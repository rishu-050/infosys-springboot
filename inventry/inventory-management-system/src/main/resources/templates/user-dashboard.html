<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link th:href="@{/css/app.css}" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script th:src="@{/js/theme-toggle.js}" defer></script>
</head>
<body>
<div class="d-flex layout">
    <aside class="sidebar d-flex flex-column">
        <a class="brand" th:href="@{/user/dashboard}">Inventory IMS</a>
        <nav class="nav flex-column p-2 gap-1">
            <a class="nav-link active" th:href="@{/user/dashboard}">Dashboard</a>
            <a class="nav-link" th:href="@{/inventory}">Inventory</a>
            <a class="nav-link" th:href="@{/low-stock}">Update Stock</a>
            <a class="nav-link" th:href="@{/requests}">Requests</a>
            <a class="nav-link" th:href="@{/change-password}">Change Password</a>
            <form th:action="@{/logout}" method="post" class="mt-2">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-warning w-100" type="submit">Logout</button>
            </form>
        </nav>
    </aside>

    <main class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="mb-0">User Dashboard</h3>
                <p class="text-muted mb-0">Inventory overview and stock updates</p>
            </div>
            <div class="d-flex align-items-center gap-2">
                <span class="user-info" sec:authentication="name"></span>
                <span class="badge bg-success" sec:authentication="principal.authorities"></span>
                <form th:action="@{/logout}" method="post" class="mb-0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="btn btn-sm btn-danger" type="submit">Logout</button>
                </form>
            </div>
        </div>

        <div th:if="${lowStockMessage}" class="alert alert-warning d-flex justify-content-between align-items-center" role="alert">
            <span th:text="${lowStockMessage}"></span>
            <a th:href="@{/low-stock}" class="btn btn-sm btn-outline-dark">Open Update Stock</a>
        </div>

        <div class="dashboard-page container-fluid px-0">
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <a th:href="@{/inventory}" style="text-decoration:none;color:inherit;">
                        <div class="card stat-card dashboard-card">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <h6>Total Products</h6>
                                    <h3 th:text="${totalProducts}">0</h3>
                                </div>
                                <i class="fas fa-box text-primary"></i>
                            </div>
                        </div>
                    </a>
                </div>

                <div class="col-md-4">
                    <a th:href="@{/low-stock}" style="text-decoration:none;color:inherit;">
                        <div class="card stat-card dashboard-card">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <h6>Low Stock</h6>
                                    <h3 class="text-danger" th:text="${lowStockCount}">0</h3>
                                </div>
                                <i class="fas fa-exclamation-triangle text-danger"></i>
                            </div>
                        </div>
                    </a>
                </div>

                <div class="col-md-4">
                    <div class="card stat-card dashboard-card">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h6>Inventory Value</h6>
                                <h3 class="inventory-value-amount" th:text="${'Rs. ' + #numbers.formatDecimal(inventoryValue,1,2)}">Rs. 0.00</h3>
                            </div>
                            <i class="fas fa-money-bill-wave text-warning"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row mt-4">
                <div class="col-md-6">
                    <div class="card dashboard-card">
                        <h5>Top Categories</h5>
                        <div class="chart-container">
                            <canvas id="categoryDonutChart"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card dashboard-card">
                        <h5>Low Stock Products</h5>
                        <div class="chart-container">
                            <canvas id="lowStockChart"></canvas>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>
</div>

<script th:inline="javascript">
    const labels = /*[[${chartLabels}]]*/ [];
    const data = /*[[${chartValues}]]*/ [];
    const lowStockLabels = /*[[${lowStockLabels}]]*/ [];
    const lowStockValues = /*[[${lowStockValues}]]*/ [];

    const categoryChart = new Chart(document.getElementById('categoryDonutChart'), {
        type: 'doughnut',
        data: {
            labels: labels,
            datasets: [{
                label: 'Products',
                data: data,
                backgroundColor: [
                    '#4e73df',
                    '#1cc88a',
                    '#36b9cc',
                    '#f6c23e',
                    '#e74a3b',
                    '#858796'
                ],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'bottom'
                }
            },
            cutout: '60%',
            onClick: (event, elements) => {
                if (elements.length > 0) {
                    const index = elements[0].index;
                    const category = categoryChart.data.labels[index];
                    window.location.href = "/inventory?category=" + encodeURIComponent(category);
                }
            }
        }
    });

    new Chart(document.getElementById('lowStockChart'), {
        type: 'bar',
        data: {
            labels: lowStockLabels,
            datasets: [{
                label: 'Stock Remaining',
                data: lowStockValues,
                backgroundColor: '#e74a3b'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            onClick: function (event, elements) {
                if (elements.length > 0) {
                    const index = elements[0].index;
                    const product = this.data.labels[index];
                    window.location.href = "/inventory?name=" + encodeURIComponent(product);
                }
            },
            plugins: {
                legend: {
                    display: false
                }
            }
        }
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
