<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Categories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
    <script th:src="@{/js/theme-toggle.js}" defer></script>
</head>
<body>
<div class="d-flex layout">
    <aside class="sidebar d-flex flex-column">
        <a class="brand" th:href="@{/dashboard}">Inventory IMS</a>
        <nav class="nav flex-column p-2 gap-1">
            <a class="nav-link" th:href="@{/dashboard}">Dashboard</a>
            <a class="nav-link" th:href="@{/products}">Products</a>
            <a class="nav-link active" th:href="@{/categories}">Categories</a>
            <a class="nav-link" th:href="@{/suppliers}">Suppliers</a>
            <a class="nav-link" th:href="@{/users}">Users</a>
            <a class="nav-link" th:href="@{/requests}">Requests</a>
            <a class="nav-link" th:href="@{/reports}">Reports</a>
            <a class="nav-link" href="/reports#login-audit-log">Login Audit</a>
            <a class="nav-link" th:href="@{/low-stock}">Low Stock</a>
            <form th:action="@{/logout}" method="post" class="mt-2">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-warning w-100" type="submit">Logout</button>
            </form>
        </nav>
    </aside>

    <main class="main-content">
        <h3 class="mb-3">Category Management</h3>
        <div class="card shadow-sm mb-3">
            <div class="card-body">
                <form th:action="@{/categories}" method="get" class="mb-3">
                    <div class="input-group">
                        <input type="text" name="keyword" class="form-control" placeholder="Search categories" th:value="${keyword}">
                        <button class="btn btn-primary">Search</button>
                    </div>
                </form>
                <a class="btn btn-outline-secondary btn-sm" th:href="@{/categories}">Reset</a>
            </div>
        </div>
        <div class="row g-3">
            <div class="col-lg-4">
                <div class="card shadow-sm" sec:authorize="hasRole('ADMIN')">
                    <div class="card-body">
                        <form th:action="@{/categories}" th:object="${category}" method="post" class="row g-3">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <div class="col-12">
                                <label class="form-label">Category Name</label>
                                <input type="text" class="form-control" th:field="*{name}" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Description</label>
                                <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
                            </div>
                            <div class="col-12">
                                <button class="btn btn-primary w-100" type="submit">Save Category</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="card table-card shadow-sm">
                    <div class="table-responsive">
                        <table class="table table-striped mb-0">
                            <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Description</th>
                                <th>Action</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="c : ${categories}">
                                <td th:text="${c.id}"></td>
                                <td th:text="${c.name}"></td>
                                <td th:text="${c.description}"></td>
                                <td>
                                    <form th:action="@{/categories/delete/{id}(id=${c.id})}" method="post" sec:authorize="hasRole('ADMIN')">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(categories)}">
                                <td colspan="4" class="text-center py-4 text-muted">No categories found.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
