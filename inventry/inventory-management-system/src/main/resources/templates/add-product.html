<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
    <script th:src="@{/js/theme-toggle.js}" defer></script>
</head>
<body>
<div class="d-flex layout">
    <aside class="sidebar d-flex flex-column">
        <a class="brand" th:href="@{/dashboard}">Inventory IMS</a>
        <nav class="nav flex-column p-2 gap-1">
            <a class="nav-link" th:href="@{/dashboard}">Dashboard</a>
            <a class="nav-link active" th:href="@{/products}">Products</a>
            <a class="nav-link" th:href="@{/categories}">Categories</a>
            <a class="nav-link" th:href="@{/suppliers}">Suppliers</a>
            <a class="nav-link" th:href="@{/users}">Users</a>
            <a class="nav-link" th:href="@{/requests}">Requests</a>
            <a class="nav-link" th:href="@{/reports}">Reports</a>
            <a class="nav-link" href="/reports#login-audit-log">Login Audit</a>
            <a class="nav-link" th:href="@{/low-stock}">Low Stock</a>
            <form th:action="@{/logout}" method="post" class="mt-2">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-warning w-100" type="submit">Logout</button>
            </form>
        </nav>
    </aside>

    <main class="main-content">
        <h3 class="mb-3">Add Product</h3>
        <div class="card shadow-sm" style="max-width:700px;">
            <div class="card-body">
                <form th:action="@{/products}" th:object="${product}" method="post" enctype="multipart/form-data" class="row g-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="col-md-6">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" th:field="*{name}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Category</label>
                        <input type="text" class="form-control" th:field="*{category}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Price</label>
                        <input type="number" step="0.01" min="0" class="form-control" th:field="*{price}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Quantity</label>
                        <input type="number" min="0" class="form-control" th:field="*{quantity}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Minimum Stock</label>
                        <input type="number" min="0" class="form-control" th:field="*{minimumStock}" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Product Image</label>
                        <input type="file" name="imageFile" class="form-control" accept="image/*" onchange="previewImage(event)">
                        <img id="preview" alt="Preview" class="mt-3 rounded border" style="width:120px;display:none;">
                    </div>
                    <div class="col-12 d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Save Product</button>
                        <a class="btn btn-outline-secondary" th:href="@{/products}">Back</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
<script>
    function previewImage(event) {
        const preview = document.getElementById('preview');
        const file = event.target.files[0];

        if (!file) {
            preview.style.display = 'none';
            preview.removeAttribute('src');
            return;
        }

        const reader = new FileReader();
        reader.onload = function () {
            preview.src = reader.result;
            preview.style.display = 'block';
        };
        reader.readAsDataURL(file);
    }
</script>
</body>
</html>
