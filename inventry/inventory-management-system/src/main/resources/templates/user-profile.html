<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
    <script th:src="@{/js/theme-toggle.js}" defer></script>
</head>
<body>
<div class="d-flex layout">
    <aside class="sidebar d-flex flex-column">
        <a class="brand" th:href="@{/admin/dashboard}">Inventory IMS</a>
        <nav class="nav flex-column p-2 gap-1">
            <a class="nav-link" th:href="@{/admin/dashboard}">Dashboard</a>
            <a class="nav-link" th:href="@{/products}">Products</a>
            <a class="nav-link" th:href="@{/categories}">Categories</a>
            <a class="nav-link" th:href="@{/suppliers}">Suppliers</a>
            <a class="nav-link active" th:href="@{/users}">Users</a>
            <a class="nav-link" th:href="@{/requests}">Requests</a>
            <a class="nav-link" th:href="@{/reports}">Reports</a>
            <a class="nav-link" href="/reports#login-audit-log">Login Audit</a>
            <a class="nav-link" th:href="@{/low-stock}">Low Stock</a>
            <form th:action="@{/logout}" method="post" class="mt-2">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-warning w-100" type="submit">Logout</button>
            </form>
        </nav>
    </aside>

    <main class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="mb-0">User Profile</h3>
            <a class="btn btn-outline-secondary btn-sm" th:href="@{/users}">Back to Users</a>
        </div>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <div class="card shadow-sm">
            <div class="card-body">
                <form th:action="@{/users/{id}(id=${userProfile.id})}" th:object="${userProfile}" method="post" class="row g-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="col-md-6">
                        <label class="form-label">User ID</label>
                        <input type="text" class="form-control" th:field="*{userId}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" th:field="*{username}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Role</label>
                        <select class="form-select" th:field="*{role}" required>
                            <option value="USER">USER</option>
                            <option value="ADMIN">ADMIN</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Contact No</label>
                        <input type="text" class="form-control" th:field="*{phone}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" th:field="*{email}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Reset Password</label>
                        <div class="input-group">
                            <input type="password"
                                   class="form-control"
                                   id="newPassword"
                                   name="newPassword"
                                   placeholder="Enter new password">
                            <button class="btn btn-outline-secondary" type="button" id="togglePasswordBtn">Show</button>
                        </div>
                        <div class="form-text">Leave blank if you do not want to change the password.</div>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Address</label>
                        <textarea class="form-control" th:field="*{address}" rows="3"></textarea>
                    </div>
                    <div class="col-12">
                        <button class="btn btn-primary" type="submit">Save Profile</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
<script>
    const passwordInput = document.getElementById('newPassword');
    const togglePasswordBtn = document.getElementById('togglePasswordBtn');

    if (passwordInput && togglePasswordBtn) {
        togglePasswordBtn.addEventListener('click', function () {
            const isPassword = passwordInput.getAttribute('type') === 'password';
            passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
            togglePasswordBtn.textContent = isPassword ? 'Hide' : 'Show';
        });
    }
</script>
</body>
</html>
